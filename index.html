<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대구 달성공원</title>
    <style>
        /* 기본 초기화 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            overflow: hidden;
        }

        /* [상단 GNB 네비게이션] */
        header {
            width: 100%;
            height: 90px;
            background-color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        /* 입체감 있는 달성공원 로고 그래픽 효과 */
        .logo {
            font-size: 34px;
            font-weight: 900;
            color: #1b9552;
            letter-spacing: -1.5px;
            text-shadow: 
                -2px -2px 0 #ffffff,  2px -2px 0 #ffffff, -2px  2px 0 #ffffff,  2px  2px 0 #ffffff,
                -3px -3px 0 #1b9552,  3px -3px 0 #1b9552, -3px  3px 0 #1b9552,  3px  3px 0 #1b9552,
                4px 4px 0px rgba(0, 0, 0, 0.15);
        }

        nav {
            display: flex;
            gap: 50px;
        }

        nav a {
            text-decoration: none;
            color: #333333;
            font-size: 18px;
            font-weight: bold;
        }

        .header-icons {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        /* 아이콘 모양 디테일 유지 */
        .icon-circle-user {
            width: 34px;
            height: 34px;
            border: 2.5px solid #7da08d;
            border-radius: 50%;
            position: relative;
        }
        .icon-circle-user::before {
            content: '';
            position: absolute;
            top: 6px; left: 10px;
            width: 8px; height: 8px;
            border: 2.5px solid #7da08d;
            border-radius: 50%;
        }
        .icon-circle-user::after {
            content: '';
            position: absolute;
            bottom: 3px; left: 4px;
            width: 20px; height: 8px;
            border: 2.5px solid #7da08d;
            border-radius: 12px 12px 0 0;
            border-bottom: none;
        }

        .icon-menu-bar {
            width: 28px;
            height: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .icon-menu-bar span {
            display: block;
            width: 100%;
            height: 4px;
            background-color: #3d6b52;
            border-radius: 2px;
        }

        /* [메인 컨텐츠 영역] */
        .main-section {
            width: 100%;
            height: 100vh;
            padding-top: 90px;
            position: relative;
            /* 잘라낸 달성공원 원본 배경 이미지 배치 */
            background: url('bg-main.jpg') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 원본의 완벽한 반원 형태 투명 어두운 장막 */
        .main-section::before {
            content: '';
            position: absolute;
            top: 15%;
            width: 130vw;
            height: 130vw;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 50%;
            z-index: 1;
        }

        /* 중앙 정렬 텍스트 레이어 */
        .center-box {
            position: relative;
            z-index: 10;
            text-align: center;
            color: #ffffff;
            width: 100%;
            max-width: 900px;
            margin-top: -60px;
        }

        /* 상단 곰돌이 배지와 가로 선셋 */
        .badge-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .line-deco {
            width: 80px;
            height: 1.5px;
            background-color: rgba(255, 255, 255, 0.6);
        }
        .badge-img {
            width: 44px;
            height: 44px;
            object-fit: contain;
        }

        .sub-title {
            font-size: 20px;
            color: #24b863;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .main-title {
            font-size: 76px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -2px;
        }

        .desc-title {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 50px;
            letter-spacing: -1px;
        }

        /* 시안과 똑같은 높이와 크기의 알약형 흰색 검색창 */
        .search-box-container {
            width: 100%;
            max-width: 660px;
            position: relative;
            margin: 0 auto;
        }

        .search-input-field {
            width: 100%;
            height: 68px;
            padding: 0 75px 0 40px;
            border-radius: 50px;
            border: none;
            font-size: 22px;
            outline: none;
            background-color: #ffffff;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .search-green-icon {
            position: absolute;
            right: 35px;
            top: 50%;
            transform: translateY(-50%);
            width: 26px;
            height: 26px;
            border: 4px solid #1b9552;
            border-radius: 50%;
            cursor: pointer;
        }
        .search-green-icon::after {
            content: '';
            position: absolute;
            top: 18px; left: 18px;
            width: 12px; height: 4px;
            background-color: #1b9552;
            transform: rotate(45deg);
        }

        /* [PNG 이미지 장식 레이아웃] */
        .decor-img {
            position: absolute;
            z-index: 5;
            object-fit: contain;
            pointer-events: none;
        }

        /* 왼쪽 나뭇잎 묶음 배치 */
        .leaf-left-group {
            bottom: -20px;
            left: -10px;
            width: 260px;
        }

        /* 오른쪽 위 나뭇잎 배치 */
        .leaf-right-group {
            top: 100px;
            right: -10px;
            width: 200px;
        }

        /* 우측 하단 크기 및 위상 완벽 매치된 사자 캐릭터 */
        .lion-char-fixed {
            position: absolute;
            bottom: 20px;
            right: 30px;
            width: 210px;
            z-index: 20;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">달성공원</div>
        <nav>
            <a href="#">공원안내</a>
            <a href="#">VR</a>
            <a href="#">기획 및 설계</a>
        </nav>
        <div class="header-icons">
            <div class="icon-circle-user"></div>
            <div class="icon-menu-bar">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main class="main-section">

        <img src="leaf-left.png" class="decor-img leaf-left-group" alt="좌측 나뭇잎">
        <img src="leaf-right.png" class="decor-img leaf-right-group" alt="우측 나뭇잎">

        <div class="center-box">
            <div class="badge-row">
                <div class="line-deco"></div>
                <img src="bear-badge.png" class="badge-img" alt="곰돌이 배지">
                <div class="line-deco"></div>
            </div>
            
            <p class="sub-title">대구광역시의 오랜 전통이 담겨있는</p>
            <h1 class="main-title">대구 달성공원</h1>
