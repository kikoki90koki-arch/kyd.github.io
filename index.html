<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대구 달성공원 - 메인홈</title>
    <style>
        /* 기본 초기화 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #ffffff;
        }

        /* 1. 상단 내비게이션 바 (GNB) */
        header {
            width: 100%;
            height: 70px;
            background-color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            border-bottom: 1px solid #f0f0f0;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #1b9552;
            cursor: pointer;
            letter-spacing: -1px;
            /* 이미지의 입체감 있는 폰트 느낌을 위한 텍스트 섀도우 */
            text-shadow: 1px 1px 0px #ffffff, 2px 2px 0px #1b9552; 
        }

        nav {
            display: flex;
            gap: 35px;
        }

        nav a {
            text-decoration: none;
            color: #333333;
            font-size: 16px;
            font-weight: bold;
            transition: color 0.2s ease;
            cursor: pointer;
        }

        nav a:hover {
            color: #1b9552;
        }

        .header-icons {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 22px;
            color: #7da08d;
            cursor: pointer;
        }

        /* 2. 메인 페이지 섹션 */
        #main-page {
            width: 100%;
            height: 100vh;
            padding-top: 70px;
            position: relative;
            /* 배경 이미지 (전통 건물 느낌의 Unsplash 이미지 배치) */
            background: url('https://images.unsplash.com/photo-1596120244123-cc9326793433?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 이미지 중앙의 어두운 반원형 투명 오버레이 레이어 */
        .arc-overlay {
            position: absolute;
            top: 15%;
            width: 85%;
            height: 120%;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 50% 50% 0 0 / 40% 40% 0 0;
            z-index: 1;
        }

        /* 메인 콘텐츠 컨테이너 */
        .main-container {
            position: relative;
            z-index: 2;
            max-width: 800px;
            width: 100%;
            text-align: center;
            color: #ffffff;
            padding: 0 20px;
            margin-top: -50px;
        }

        /* 중앙 상단 미니 아이콘 뱃지 */
        .mini-badge {
            display: inline-block;
            background-color: #ffffff;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            line-height: 36px;
            font-size: 18px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .main-subtitle {
            font-size: 16px;
            color: #2edb74;
            margin-bottom: 8px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .main-title {
            font-size: 55px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .main-desc {
            font-size: 24px;
            margin-bottom: 35px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* 알약 모양의 검색창 스타일 */
        .search-bar-container {
            width: 100%;
            max-width: 520px;
            position: relative;
            margin: 0 auto;
        }

        .search-bar {
            width: 100%;
            padding: 14px 60px 14px 25px;
            border-radius: 50px;
            border: none;
            font-size: 16px;
            outline: none;
            background-color: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .search-icon {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: #1b9552;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 3. 장식용 그래픽 요소들 (나뭇잎, 캐릭터 등 배경 레이아웃 배치) */
        .deco-leaf-left-top {
            position: absolute;
            top: 90px;
            left: -20px;
            font-size: 120px;
            color: #24b863;
            opacity: 0.9;
            z-index: 2;
            user-select: none;
            transform: rotate(-15deg);
        }

        .deco-leaf-left-bottom {
            position: absolute;
            bottom: 20px;
            left: -30px;
            font-size: 140px;
            color: #1b9552;
            opacity: 0.9;
            z-index: 2;
            user-select: none;
            transform: rotate(20deg);
        }

        .deco-leaf-right-top {
            position: absolute;
            top: 80px;
            right: -20px;
            font-size: 110px;
            color: #24b863;
            opacity: 0.8;
            z-index: 2;
            user-select: none;
            transform: rotate(45deg);
        }

        /* 우측 하단 사자 캐릭터 스팟 마크 */
        .char-lion {
            position: absolute;
            bottom: 40px;
            right: 40px;
            z-index: 3;
            text-align: center;
            user-select: none;
        }

        .lion-icon {
            font-size: 90px;
            line-height: 1;
            display: block;
            filter: drop-shadow(2px 4px 5px rgba(0,0,0,0.2));
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">달성공원</div>
        <nav>
            <a style="color: #1b9552;">공원안내</a>
            <a>VR</a>
            <a>기획 및 설계</a>
        </nav>
        <div class="header-icons">
            <span>👤</span>
            <span>☰</span>
        </div>
    </header>

    <main id="main-page">
        <div class="arc-overlay"></div>

        <div class="deco-leaf-left-top">🌿</div>
        <div class="deco-leaf-left-bottom">🌿</div>
        
        <div class="deco-leaf-right-top">🌿</div>

        <div class="main-container">
            <div class="mini-badge">🐻</div>
            <p class="main-subtitle">대구광역시의 오랜 전통이 담겨있는</p>
            <h1 class="main-title">대구 달성공원</h1>
            <p class="main-desc">모두와 함께 쉬는 공간</p>
            
            <div class="search-bar-container">
                <input type="text" class="search-bar" placeholder="">
                <span class="search-icon">🔍</span>
            </div>
        </div>

        <div class="char-lion">
            <span class="lion-icon">🦁</span>
        </div>
    </main>

</body>
</html>
