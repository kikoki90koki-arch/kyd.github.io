<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        /* 1. 기본 스타일 초기화 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }

        /* 2. 상단 헤더 내비게이션 (이미지 상단 구조 반영) */
        header {
            width: 100%;
            height: 80px;
            background-color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #1b9552;
            letter-spacing: -1px;
            /* 이미지 특유의 테두리가 있는 듯한 로고 느낌 표현 */
            text-shadow: -1px -1px 0 #ffffff, 1px -1px 0 #ffffff, -1px 1px 0 #ffffff, 1px 1px 0 #ffffff, 2px 2px 0px #1b9552;
            cursor: pointer;
        }

        nav {
            display: flex;
            gap: 40px;
            margin-left: 60px;
        }

        nav a {
            text-decoration: none;
            color: #333333;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .header-icons {
            display: flex;
            align-items: center;
            gap: 25px;
            font-size: 24px;
            color: #7da08d;
            cursor: pointer;
        }

        /* 3. 메인 비주얼 영역 (전체 화면 배경) */
        .main-viewport {
            width: 100%;
            height: 100vh;
            padding-top: 80px;
            position: relative;
            /* 배경 대문: 달성공원 정문 느낌의 전통 건축물 Unsplash 이미지 배치 */

            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
